<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bootstrap Components</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container my-4">
        <h1 class="text-center mb-4">All Bootstrap Components</h1>


        <div class="accordion mb-3">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#a1">Accordion</button>
                </h2>
                <div id="a1" class="accordion-collapse collapse show">
                    <div class="accordion-body">Content</div>
                </div>
            </div>
        </div>


        <div class="alert alert-primary">Alert</div>


        <span class="badge bg-success">Badge</span>


        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item">Home</li>
                <li class="breadcrumb-item active">Library</li>
            </ol>
        </nav>


        <button class="btn btn-primary">Button</button>


        <div class="btn-group">
            <button class="btn btn-secondary">Left</button>
            <button class="btn btn-secondary">Right</button>
        </div>


        <div class="card my-3" style="width: 18rem;">
            <div class="card-body">Card</div>
        </div>


        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://in.images.search.yahoo.com/yhs/view;_ylt=Awr1QacRic5p3Wkg2j8O9olQ;_ylu=c2VjA3NyBHNsawNpbWcEb2lkA2JkMjM0OTQ3YWE5MzM5N2U0YTY3NzJmZDMzYTI5ZTkxBGdwb3MDNgRpdANiaW5n?back=https%3A%2F%2Fin.images.search.yahoo.com%2Fyhs%2Fsearch%3Fp%3Dimage%26ei%3DUTF-8%26type%3Dtype80410-2184732695%26fr%3Dyhs-sz-024%26hsimp%3Dyhs-024%26hspart%3Dsz%26param1%3D64198726%26tab%3Dorganic%26ri%3D6&w=6087&h=3749&imgurl=images.pexels.com%2Fphotos%2F1046209%2Fpexels-photo-1046209.jpeg%3Fcs%3Dsrgb%26dl%3Dpexels-arnesh-yadram-391884-1046209.jpg%26fm%3Djpg&rurl=https%3A%2F%2Fwww.pexels.com%2Fsearch%2Fabstract%2520tree%2F&size=776KB&p=image&oid=bd234947aa93397e4a6772fd33a29e91&fr2=&fr=yhs-sz-024&tt=Abstract+Tree+Photos%2C+Download+The+BEST+Free+Abstract+Tree+Stock+Photos+...&b=0&ni=21&no=6&ts=&tab=organic&sigr=Bad5TkCp5vdQ&sigb=BPvptXIaqzPp&sigi=tGN8kWCV8O82&sigt=XaXCnm2LW7Kn&.crumb=H6BGo7TR90G&fr=yhs-sz-024&hsimp=yhs-024&hspart=sz&type=type80410-2184732695&param1=64198726" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/800x200" class="d-block w-100">
                </div>
            </div>
        </div>


        <button class="btn-close"></button>


        <button class="btn btn-info" data-bs-toggle="collapse" data-bs-target="#collapseEx">Toggle</button>
        <div id="collapseEx" class="collapse">Collapsed content</div>


        <div class="dropdown my-3">
            <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">Dropdown</button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item">Item</a></li>
            </ul>
        </div>


        <ul class="list-group">
            <li class="list-group-item">Item 1</li>
        </ul>


        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalEx">Modal</button>
        <div class="modal fade" id="modalEx">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-body">Modal content</div>
                </div>
            </div>
        </div>


        <nav class="navbar navbar-dark bg-dark my-3">
            <div class="container-fluid"><a class="navbar-brand">Navbar</a></div>
        </nav>


        <ul class="nav nav-tabs">
            <li class="nav-item"><a class="nav-link active">Tab</a></li>
        </ul>


        <button class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#offcanvasEx">Offcanvas</button>
        <div class="offcanvas offcanvas-start" id="offcanvasEx">
            <div class="offcanvas-body">Sidebar</div>
        </div>


        <ul class="pagination">
            <li class="page-item"><a class="page-link">1</a></li>
        </ul>


        <button class="btn btn-secondary" data-bs-toggle="popover" title="Popover"
            data-bs-content="Content">Popover</button>


        <div class="progress my-3">
            <div class="progress-bar" style="width:50%"></div>
        </div>


        <div class="position-relative" style="height:100px; overflow:auto;" data-bs-spy="scroll">
            <p>Scrollspy content</p>
        </div>


        <div class="spinner-border"></div>


        <div class="toast show">
            <div class="toast-body">Toast</div>
        </div>


        <button class="btn btn-info" data-bs-toggle="tooltip" title="Tooltip">Tooltip</button>


        <form class="my-3">
            <input class="form-control" placeholder="Input">
        </form>


        <div class="row">
            <div class="col bg-primary text-white">Col1</div>
            <div class="col bg-secondary text-white">Col2</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        })

        var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
        popoverTriggerList.map(function (popoverTriggerEl) {
            return new bootstrap.Popover(popoverTriggerEl)
        })
    </script>
</body>

</html>
