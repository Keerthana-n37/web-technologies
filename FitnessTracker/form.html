<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
</head>

<body>
    <form>
        <div>
            <h1><b>Registration Form for Fitness Tracker</b></h1>
        </div>
        <hr>

        <div>
            <i>Name</i>
            <span>*</span>
            <span>:</span>
            <input type="text" id="name" name="name" required>
        </div>
        <br>

        <div>
            <i>Age</i>
            <span>*</span>
            <span>:</span>
            <input type="number" id="age" name="age" required>
        </div>

        <br>

        <div>
            <i>Email</i>
            <span>*</span>
            <span>:</span>
            <input type="email" id="email" name="email" required>
        </div>
        <br>

        <div>
            <i>Password</i>
            <span>*</span>
            <input type="password" id="password" name="password" required>
        </div>
        <br>

        <div>
            <i>Workout Date</i>
            <span>*</span>
            <span>:</span>
            <input type="date" id="workoutDate" name="workoutDate" required>
        </div>
        <br>

        <div>
            <i>Workout Time</i>
            <span>*</span>
            <span>:</span>
            <input type="time" id="workoutTime" name="workoutTime" required>
        </div>
        <br>

        <div>
            <i>Fitness Level</i>
            <span>:</span>
            <input type="range" id="fitnessLevel" name="fitnessLevel" min="1" max="10">
        </div>
        <br>

        <div>
            <i>Upload Photo</i>
            <span>*</span>
            <span>:</span>
            <input type="file" id="photo" name="photo">
        </div>
        <br>

        <div>
            <input type="submit" >
            <button>Cancel </button>
        </div>

    </form>
</body>

</html>
