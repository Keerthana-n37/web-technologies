<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form page</title>
</head>

<body>

    <form>

        <div>
            <h1>Online Education Registration Form</h1>
        </div>

        <div>
            <b>Student Name</b>
            <span>*</span>
            <span>:</span>
            <input type="text" id="studentName" name="studentName" required>
        </div>
        <br>

        <div>
            <b>Email Address</b>
            <span>*</span>
            <span>:</span>
            <input type="email" id="email" name="email" required>
        </div>
        <br>

        <div>
            <b>Create Password</b>
            <span>*</span>
            <span>:</span>
            <input type="password" id="password" name="password" required>
        </div>
        <br>

        <div>
            <b>Age</b>
            <span>*</span>
            <span>:</span>
            <input type="number" id="age" name="age">
        </div>
        <br>

        <div>
            <b>Course Start Date</b>
            <span>*</span>
            <span>:</span>
            <input type="date" id="courseDate" name="courseDate">
        </div>
        <br>

        <div>
            <b>Preferred Class Time</b>
            <span>*</span>
            <span>:</span>
            <input type="time" id="classTime" name="classTime">
        </div>
        <br>

        <div>
            <b>Upload Qualification Certificate</b>
            <span>*</span>
            <span>:</span>
            <input type="file" id="certificate" name="certificate">
        </div>
        <br>

        <div>
            <b>Favorite Theme Color</b>
            <span>*</span>
            <span>:</span>
            <input type="color" id="themeColor" name="themeColor">
        </div>
        <br>

        <div>
            <b>Learning Progress Level</b>
            <span>*</span>
            <span>:</span>
            <input type="range" id="progress" name="progress" min="1" max="10">
        </div>
        <br>

        <div>
            <input type="submit" id="submit" name="submit" value="Register">
        </div>

    </form>

</body>

</html>
